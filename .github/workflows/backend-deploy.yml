name: backend-deploy

# Two deploy targets. Pick whichever your team uses and add the matching
# secrets in: repo Settings -> Secrets and variables -> Actions.
#   RENDER_DEPLOY_HOOK_URL   (Render -> service -> Settings -> Deploy Hook)
#   FLY_API_TOKEN            (`flyctl auth token` -> repo secret)
# Either secret missing? That target is skipped. Both empty = no-op.

on:
  push:
    branches: [main]
    paths:
      - "nutrifit-backend/**"
      - "render.yaml"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  render:
    name: Deploy to Render
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_TARGET == 'render' || vars.DEPLOY_TARGET == '' }}
    steps:
      - name: Trigger Render deploy hook
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK_URL not set - skipping."
            exit 0
          fi
          curl -fsS -X POST "$HOOK"
          echo "Render deploy triggered."

  fly:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    if: ${{ vars.DEPLOY_TARGET == 'fly' }}
    defaults:
      run:
        working-directory: nutrifit-backend
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "FLY_API_TOKEN not set - skipping."
            exit 0
          fi
          flyctl deploy --remote-only

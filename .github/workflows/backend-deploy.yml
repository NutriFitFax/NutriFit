name: backend-deploy

# Deploy target. Pick whichever your team uses and add the matching secrets in:
# repo Settings -> Secrets and variables -> Actions.
#   RENDER_DEPLOY_HOOK_URL   (Render -> service -> Settings -> Deploy Hook)
#   FLY_API_TOKEN            (`flyctl auth token` -> repo secret)
# Missing secret = no-op.

on:
  push:
    branches: [main]
    paths:
      - "nutrifit-backend/**"
      - "render.yaml"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy backend
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        if: ${{ vars.DEPLOY_TARGET == 'render' || vars.DEPLOY_TARGET == '' }}
        env:
          HOOK: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "RENDER_DEPLOY_HOOK_URL not set - skipping."
            exit 0
          fi
          curl -fsS -X POST "$HOOK"
          echo "Render deploy triggered."

      - uses: actions/checkout@v6
        if: ${{ vars.DEPLOY_TARGET == 'fly' }}
        with:
          token: ${{ github.token }}

      - uses: superfly/flyctl-actions/setup-flyctl@master
        if: ${{ vars.DEPLOY_TARGET == 'fly' }}

      - name: Deploy to Fly.io
        if: ${{ vars.DEPLOY_TARGET == 'fly' }}
        working-directory: nutrifit-backend
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "FLY_API_TOKEN not set - skipping."
            exit 0
          fi
          flyctl deploy --remote-only

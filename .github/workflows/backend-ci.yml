name: backend-ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ github.token }}
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - "nutrifit-backend/**"
              - "render.yaml"
              - ".github/workflows/backend-ci.yml"

  test:
    name: maven test
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nutrifit-backend
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ github.token }}

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Tests
        run: mvn -B test

  docker:
    name: docker build
    needs: [changes, test]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ github.token }}
      - uses: docker/setup-buildx-action@v4
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: ./nutrifit-backend
          push: false
          tags: nutrifit-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

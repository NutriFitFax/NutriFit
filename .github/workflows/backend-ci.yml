name: backend-ci

on:
  push:
    branches: [main]
    paths:
      - "nutrifit-backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "nutrifit-backend/**"
      - ".github/workflows/backend-ci.yml"

permissions:
  contents: read

jobs:
  test:
    name: lint + test (py${{ matrix.python }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nutrifit-backend
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
          cache-dependency-path: nutrifit-backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Tests (pytest)
        run: pytest -q

  docker:
    name: docker build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./nutrifit-backend
          push: false
          tags: nutrifit-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

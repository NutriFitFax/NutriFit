name: backend-ci

on:
  push:
    branches: [main]
    paths:
      - "nutrifit-backend/**"
      - "render.yaml"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "nutrifit-backend/**"
      - "render.yaml"
      - ".github/workflows/backend-ci.yml"

permissions:
  contents: read

jobs:
  test:
    name: maven test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nutrifit-backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Tests
        run: mvn -B test

  docker:
    name: docker build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./nutrifit-backend
          push: false
          tags: nutrifit-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

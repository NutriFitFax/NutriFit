name: nutrifit
description: NutriFit Flutter mobile app.
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  http_parser: ^4.0.2
  image_picker: ^1.1.2
  mobile_scanner: ^5.2.3
  permission_handler: ^11.3.1
  shimmer: ^3.0.0
  vibration: ^2.0.0
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

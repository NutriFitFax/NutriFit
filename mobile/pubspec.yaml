name: nutrifit
description: NutriFit Flutter mobile app.
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  http_parser: ^4.0.2
  image_picker: ^1.1.2
  mobile_scanner: ^5.2.3
  permission_handler: ^11.3.1
  shimmer: ^3.0.0
  vibration: ^2.0.0
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.0
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.4
  path: ^1.9.0
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.4
  flutter_timezone: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"

flutter:
  uses-material-design: true

# Render Blueprint - https://render.com/docs/blueprint-spec
# Render looks for this file at the repository root by default.
services:
  - type: web
    name: nutrifit-backend
    runtime: docker
    plan: free
    region: frankfurt
    branch: main
    dockerfilePath: ./nutrifit-backend/Dockerfile
    dockerContext: ./nutrifit-backend
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: staging
      - key: CORS_ORIGINS
        value: "*"
      - key: USDA_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: OPENAI_API_KEY
        sync: false

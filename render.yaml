# Render Blueprint - https://render.com/docs/blueprint-spec
# Render looks for this file at the repository root by default.
services:
  - type: web
    name: nutrifit-backend
    runtime: python
    plan: free
    region: frankfurt
    branch: main
    rootDir: nutrifit-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: staging
      - key: CORS_ORIGINS
        value: "*"
      - key: PYTHON_VERSION
        value: "3.12.5"
      - key: OPENAI_API_KEY
        sync: false

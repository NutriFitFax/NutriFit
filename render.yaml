# Render Blueprint - https://render.com/docs/blueprint-spec
# Render looks for this file at the repository root by default.
services:
  - type: web
    name: nutrifit-backend
    runtime: docker
    plan: free
    region: frankfurt
    branch: main
    dockerfilePath: ./nutrifit-backend/Dockerfile
    dockerContext: ./nutrifit-backend
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: staging
      - key: CORS_ORIGINS
        value: "*"
      - key: USDA_API_KEY
        sync: false
      - key: SPOONACULAR_BASE_URL
        value: https://api.spoonacular.com
      - key: SPOONACULAR_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o
      - key: OPENAI_API_KEY
        sync: false
      # Supabase Postgres (project pyfpxlhmqjdorsqhbtyh, eu-west-1).
      # JDBC Session pooler URL from Supabase -> Project Settings -> Database.
      # Example: jdbc:postgresql://aws-0-eu-west-1.pooler.supabase.com:5432/postgres
      - key: SUPABASE_DB_URL
        sync: false
      # Pooler user: postgres.pyfpxlhmqjdorsqhbtyh
      - key: SUPABASE_DB_USER
        sync: false
      - key: SUPABASE_DB_PASSWORD
        sync: false
